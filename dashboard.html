{% extends 'base.html' %}

{% block content %}

<div class="animate__animated animate__fadeIn">

<div class="d-flex justify-content-between mb-3">

<h2>Student Dashboard</h2>

<a href="{% url 'create' %}"
   class="btn btn-success btn-custom">
   + Add Student
</a>

</div>

<div class="row">

{% for student in students %}

<div class="col-md-4">

<div class="card p-3 mb-3">

{% if student.photo %}
<img src="{{ student.photo.url }}"
     height="150"
     class="rounded mb-2">
{% endif %}

<h5>{{ student.name }}</h5>
<p>{{ student.email }}</p>

<a href="{% url 'update' student.id %}"
   class="btn btn-warning btn-sm btn-custom">
   Edit
</a>

<a href="{% url 'delete' student.id %}"
   class="btn btn-danger btn-sm btn-custom">
   Delete
</a>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
