{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card p-4 animate__animated animate__zoomIn">

<h3 class="text-center mb-3">
Login
</h3>

<form method="post">
{% csrf_token %}

<input type="text"
       name="username"
       placeholder="Username"
       class="form-control mb-3">

<input type="password"
       name="password"
       placeholder="Password"
       class="form-control mb-3">

<button class="btn btn-primary w-100 btn-custom">
Login
</button>

</form>

</div>

</div>
<p class="text-center mt-3">

Don't have an account?

<a href="{% url 'signup' %}">
Sign Up
</a>

</p>

</div>

{% endblock %}
